<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --panel: #18181c;
      --border: #2a2a30;
      --display-bg: #0b0b0d;
      --accent: #f0e040;
      --accent-dim: #b8aa20;
      --op-bg: #222228;
      --op-hover: #2e2e36;
      --num-bg: #1c1c22;
      --num-hover: #26262e;
      --eq-bg: #f0e040;
      --eq-hover: #d4c832;
      --text-main: #f2f2f0;
      --text-muted: #7a7a88;
      --text-dark: #111112;
      --radius: 20px;
      --btn-radius: 14px;
      --shadow: 0 32px 80px rgba(0,0,0,0.7);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(240,224,64,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(100,80,200,0.05) 0%, transparent 55%);
    }

    .calc-wrapper {
      perspective: 900px;
    }

    .calc {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
      padding: 20px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: floatIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── HEADER ── */
    .calc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }
    .calc-title {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .dot-group { display: flex; gap: 6px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border);
    }
    .dot:first-child  { background: #ff5f57; }
    .dot:nth-child(2) { background: #ffbd2e; }
    .dot:last-child   { background: #28ca41; }

    /* ── DISPLAY ── */
    .display {
      background: var(--display-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px 14px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
      position: relative;
    }
    .display::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(240,224,64,0.03) 0%, transparent 60%);
      border-radius: 12px;
      pointer-events: none;
    }
    .display-expr {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 300;
      min-height: 18px;
      letter-spacing: 0.04em;
      transition: opacity 0.15s;
      word-break: break-all;
      text-align: right;
    }
    .display-value {
      font-size: 40px;
      font-weight: 500;
      color: var(--text-main);
      letter-spacing: -0.02em;
      line-height: 1.1;
      word-break: break-all;
      text-align: right;
      transition: transform 0.1s, color 0.15s;
    }
    .display-value.pop {
      animation: pop 0.12s ease;
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .display-value.result {
      color: var(--accent);
    }

    /* ── BUTTON GRID ── */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      font-family: 'DM Mono', monospace;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: var(--btn-radius);
      height: 62px;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 0.01em;
      transition: background 0.1s, transform 0.08s, box-shadow 0.1s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    button::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(255,255,255,0);
      transition: background 0.15s;
    }
    button:active::after { background: rgba(255,255,255,0.07); }
    button:active { transform: scale(0.94); }

    /* Number buttons */
    .btn-num {
      background: var(--num-bg);
      color: var(--text-main);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .btn-num:hover { background: var(--num-hover); }

    /* Operator buttons */
    .btn-op {
      background: var(--op-bg);
      color: var(--accent);
      font-size: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .btn-op:hover { background: var(--op-hover); }
    .btn-op.active-op {
      background: rgba(240,224,64,0.12);
      box-shadow: 0 0 0 1.5px var(--accent-dim), 0 2px 8px rgba(0,0,0,0.3);
    }

    /* Function buttons (AC, ±, %) */
    .btn-fn {
      background: var(--op-bg);
      color: var(--text-muted);
      font-size: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .btn-fn:hover { background: var(--op-hover); color: var(--text-main); }

    /* Equals */
    .btn-eq {
      background: var(--eq-bg);
      color: var(--text-dark);
      font-size: 22px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(240,224,64,0.25), inset 0 1px 0 rgba(255,255,255,0.25);
    }
    .btn-eq:hover { background: var(--eq-hover); }

    /* Zero button spans 2 cols */
    .btn-zero { grid-column: span 2; justify-content: flex-start; padding-left: 22px; text-align: left; }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      transform: scale(0);
      animation: ripple-anim 0.4s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Footer */
    .calc-footer {
      text-align: center;
      font-size: 10px;
      color: var(--border);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 400;
    }
  </style>
</head>
<body>
<div class="calc-wrapper">
  <div class="calc">

    <div class="calc-header">
      <span class="calc-title">Calc</span>
      <div class="dot-group">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="display">
      <div class="display-expr" id="expr"></div>
      <div class="display-value" id="display">0</div>
    </div>

    <div class="btn-grid">
      <!-- Row 1 -->
      <button class="btn-fn" data-action="clear">AC</button>
      <button class="btn-fn" data-action="sign">±</button>
      <button class="btn-fn" data-action="percent">%</button>
      <button class="btn-op" data-action="op" data-op="÷">÷</button>
      <!-- Row 2 -->
      <button class="btn-num" data-action="num" data-val="7">7</button>
      <button class="btn-num" data-action="num" data-val="8">8</button>
      <button class="btn-num" data-action="num" data-val="9">9</button>
      <button class="btn-op" data-action="op" data-op="×">×</button>
      <!-- Row 3 -->
      <button class="btn-num" data-action="num" data-val="4">4</button>
      <button class="btn-num" data-action="num" data-val="5">5</button>
      <button class="btn-num" data-action="num" data-val="6">6</button>
      <button class="btn-op" data-action="op" data-op="−">−</button>
      <!-- Row 4 -->
      <button class="btn-num" data-action="num" data-val="1">1</button>
      <button class="btn-num" data-action="num" data-val="2">2</button>
      <button class="btn-num" data-action="num" data-val="3">3</button>
      <button class="btn-op" data-action="op" data-op="+">+</button>
      <!-- Row 5 -->
      <button class="btn-num btn-zero" data-action="num" data-val="0">0</button>
      <button class="btn-num" data-action="decimal">.</button>
      <button class="btn-eq" data-action="equals">=</button>
    </div>

    <div class="calc-footer">v1.0 &nbsp;·&nbsp; kishore</div>
  </div>
</div>

<script>
  const display   = document.getElementById('display');
  const exprEl    = document.getElementById('expr');

  let current     = '0';
  let previous    = null;
  let operator    = null;
  let justEvaled  = false;
  let waitingOp   = false;

  const MAX_LEN = 12;

  function fmt(n) {
    const num = parseFloat(n);
    if (isNaN(num)) return 'Error';
    if (!isFinite(num)) return num > 0 ? '∞' : '-∞';
    const s = parseFloat(num.toPrecision(10)).toString();
    if (s.length > MAX_LEN) {
      const exp = num.toExponential(4);
      return exp.length <= MAX_LEN ? exp : 'Overflow';
    }
    return s;
  }

  function updateDisplay(val, isResult = false) {
    display.textContent = fmt(val);
    display.classList.toggle('result', isResult);
    display.classList.remove('pop');
    void display.offsetWidth;
    display.classList.add('pop');
  }

  function clearActiveOps() {
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active-op'));
  }

  function markActiveOp(op) {
    clearActiveOps();
    document.querySelectorAll('.btn-op[data-op]').forEach(b => {
      if (b.dataset.op === op) b.classList.add('active-op');
    });
  }

  function calculate(a, b, op) {
    a = parseFloat(a); b = parseFloat(b);
    switch (op) {
      case '+': return a + b;
      case '−': return a - b;
      case '×': return a * b;
      case '÷': return b === 0 ? (a === 0 ? NaN : Infinity) : a / b;
    }
  }

  function handleNum(val) {
    if (justEvaled) { current = val; justEvaled = false; clearActiveOps(); exprEl.textContent = ''; }
    else if (waitingOp) { current = val; waitingOp = false; }
    else { current = current === '0' ? val : (current.length < MAX_LEN ? current + val : current); }
    updateDisplay(current);
  }

  function handleOp(op) {
    justEvaled = false;
    if (operator && !waitingOp) {
      const result = calculate(previous, current, operator);
      previous = String(result);
      exprEl.textContent = fmt(result) + ' ' + op;
      updateDisplay(result);
    } else {
      previous = current;
      exprEl.textContent = fmt(current) + ' ' + op;
    }
    operator  = op;
    waitingOp = true;
    markActiveOp(op);
  }

  function handleEquals() {
    if (!operator || !previous) return;
    const b = current;
    const result = calculate(previous, b, operator);
    exprEl.textContent = fmt(previous) + ' ' + operator + ' ' + fmt(b) + ' =';
    current    = String(result);
    previous   = null;
    operator   = null;
    justEvaled = true;
    waitingOp  = false;
    clearActiveOps();
    updateDisplay(result, true);
  }

  function handleClear() {
    current = '0'; previous = null; operator = null;
    justEvaled = false; waitingOp = false;
    exprEl.textContent = '';
    clearActiveOps();
    updateDisplay('0');
  }

  function handleSign() {
    current = String(parseFloat(current) * -1);
    updateDisplay(current);
  }

  function handlePercent() {
    current = String(parseFloat(current) / 100);
    updateDisplay(current);
  }

  function handleDecimal() {
    if (justEvaled) { current = '0.'; justEvaled = false; updateDisplay(current); return; }
    if (waitingOp)  { current = '0.'; waitingOp = false; updateDisplay(current); return; }
    if (!current.includes('.')) {
      current += '.';
      display.textContent = current;
      display.classList.remove('result');
    }
  }

  // Event delegation
  document.querySelector('.btn-grid').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const { action, op, val } = btn.dataset;
    switch (action) {
      case 'num':     handleNum(val);     break;
      case 'op':      handleOp(op);       break;
      case 'equals':  handleEquals();     break;
      case 'clear':   handleClear();      break;
      case 'sign':    handleSign();       break;
      case 'percent': handlePercent();    break;
      case 'decimal': handleDecimal();    break;
    }
    // Ripple
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    btn.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if      (e.key >= '0' && e.key <= '9') handleNum(e.key);
    else if (e.key === '+') handleOp('+');
    else if (e.key === '-') handleOp('−');
    else if (e.key === '*') handleOp('×');
    else if (e.key === '/') { e.preventDefault(); handleOp('÷'); }
    else if (e.key === 'Enter' || e.key === '=') handleEquals();
    else if (e.key === 'Escape') handleClear();
    else if (e.key === 'Backspace') {
      if (current.length > 1) { current = current.slice(0, -1); updateDisplay(current); }
      else { current = '0'; updateDisplay('0'); }
    }
    else if (e.key === '.') handleDecimal();
    else if (e.key === '%') handlePercent();
  });
</script>
</body>
</html>
